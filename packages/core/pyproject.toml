[project]
name = "pynote-core"
version = "0.1.0"
description = "Shared models, settings, and LLM/db deps for PyNote."
requires-python = ">=3.12"
dependencies = [
  # config
  "pydantic>=2.9",
  "pydantic-settings>=2.6",
  # db
  "sqlmodel>=0.0.22",
  "psycopg[binary,pool]>=3.2",
  "sqlalchemy>=2.0",
  "alembic>=1.13",
  "pgvector>=0.3",
  # llm — LangChain stack (free-tier capable, see COSTS.md)
  "langchain-core>=0.3",
  "langchain>=0.3",
  "langchain-anthropic>=0.3",     # works against GH Models endpoint too
  "langchain-google-genai>=2",    # Gemini free tier
  # observability
  "langsmith>=0.2",
  # storage
  "boto3>=1.35",
  # parsing (M1: PDF only via PyMuPDF; swap to Docling in M2 for section detection)
  "pymupdf>=1.25",
  # embeddings (M2: fastembed default; bge-m3 / voyage are swap-in options)
  "fastembed>=0.4",
  # rerank (M3: Voyage rerank-2.5 — first 200M tok/mo free; optional in prototype)
  "langchain-voyageai>=0.1",
  # chat orchestration (M4: LangGraph w/ PostgresSaver thread state)
  "langgraph>=0.6",
  "langgraph-checkpoint-postgres>=2",
  # misc
  "httpx>=0.27",
  "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pynote_core"]
