# Multi-process dev runner. Install: https://github.com/pvolok/mprocs
# Usage: `just dev`  (or `mprocs` directly)
#
# Each process gets its own log pane. Ctrl-A then a digit jumps panes.
# `q` quits all. Restart a single one with `r`.

procs:
  services:
    shell: docker compose -f docker-compose.dev.yml up
    autostart: true

  api:
    # Module entrypoint installs WindowsSelectorEventLoopPolicy before uvicorn loads.
    shell: uv run python -m pynote_api
    autostart: true

  worker:
    # Same Windows policy fix for arq.
    shell: uv run python -m pynote_worker
    autostart: true

  web:
    shell: pnpm dev
    cwd: apps/web
    autostart: true

# Run pre-checks (env file + venv) on launch.
hide_keymap_window: false
