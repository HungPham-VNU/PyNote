# Render Blueprint — provisions the PyNote API + worker as two free Docker web
# services (DEPLOY.md §3.4/§3.5). Render reads this on "New > Blueprint".
#
# Secrets are declared `sync: false` — Render prompts for their values in the
# dashboard at deploy time and never stores them in this (public) repo. Shared
# values live in the `pynote-shared` env-var group so you enter each once and
# both services inherit it.
#
# Region `virginia` matches the Neon/Upstash us-east-1 region for low latency.

envVarGroups:
  - name: pynote-shared
    envVars:
      # ---- secrets: fill these in the Render dashboard ----
      - key: DATABASE_URL          # Neon, postgresql+psycopg://…?sslmode=require
        sync: false
      - key: REDIS_URL             # Upstash, rediss://…
        sync: false
      - key: S3_ENDPOINT_URL       # https://<account>.r2.cloudflarestorage.com
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # ---- non-secret config: baked in, no need to type ----
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: S3_BUCKET
        value: pynote-sources
      - key: EMBEDDING_DIM
        value: "384"
      - key: ENVIRONMENT
        value: production
      - key: PROVIDER_TIER
        value: prod
      - key: ANTHROPIC_BASE_URL
        value: https://api.anthropic.com

services:
  # ---- API (FastAPI, serves the browser + enqueues jobs) ----
  - type: web
    name: pynote-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    region: virginia
    plan: free
    healthCheckPath: /healthz
    envVars:
      - fromGroup: pynote-shared
      - key: CLERK_SECRET_KEY      # sk_test_… from your Clerk dashboard
        sync: false
      - key: CLERK_JWKS_URL        # https://<slug>.clerk.accounts.dev/.well-known/jwks.json
        sync: false
      - key: CORS_ORIGINS          # set to your Vercel URL after Step 6
        sync: false

  # ---- Worker (arq, parses + embeds sources) ----
  - type: web
    name: pynote-worker
    runtime: docker
    dockerfilePath: apps/worker/Dockerfile
    dockerContext: .
    region: virginia
    plan: free
    # NO healthCheckPath: the worker does long CPU-bound embeds that saturate
    # the free-tier vCPU. An active health check times out during embedding and
    # Render restarts the worker mid-job, killing it before it can persist
    # chunks and mark the source `ready` (source stuck at "embedding"). The
    # worker still binds $PORT via its health server, which satisfies Render's
    # one-time port scan — that's all Render needs to keep a web service alive.
    envVars:
      - fromGroup: pynote-shared
      - key: WORKER_CONCURRENCY
        value: "1"
